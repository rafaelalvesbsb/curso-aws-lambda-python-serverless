openapi: 3.0.2
info:
  version: 1.0.0
  title: API de Movimentações
  description: |
    Recupera as movimentações de uma conta
servers:
  - url: https://api.btgpactual.com/iaas-api-operation
paths:
  /api/v1/operation-history/full/{accountNumber}:
    get:
      tags:
        - get-movements-by-account-full
      summary: "Recupera todas as movimentações de uma conta"
      description: |
        Endpoint responsável pela busca de todas as movimentações desde o início da conta. 

        Após a requisição ser realizada com sucesso, os dados ficarão **estáticos por 12h**.  

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, 
        que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Movimentações por conta (operations-by-account)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        ---
        **Características:**

        Tipo de chamada: Assíncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: N/A *(Não se Aplica)*
      parameters:
        - name: fetch_current_account
          description: |
            Flag para trazer informações de Conta Corrente (Por default este valor é "true"). 
            Deve ser passado no Headers apenas quando quiser passar "true", caso contrário não deve ser informado.

            Exemplo: `no_value`
          schema:
            type: string
          in: header
          required: false
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: |
            Número da conta para buscar resumo da posição.
            
            Example: `001234567`
          schema:
            type: string
          in: path
          required: true
      responses:
        "202":
          description: Accepted
        "500":
          content:
            application/json:
              examples:
                Erro interno:
                  value:
                    errors:
                      - code: 500
                        message: Internal Server error for partner with cnpj 12456461
          description: "Erro interno, o administrador da API deverá ser informado."
        "401":
          content:
            application/json:
              examples:
                Não autorizado:
                  value:
                    status: 401
                    title: Unable to process the request
                    meta:
                      globalErrors:
                        - code: Authorization Error
                          message:
                            "access_token: The Token has expired on Wed Jul 28\
                            \ 12:49:16 UTC 2021."
          description: Token de acesso não autorizado
        "404":
          content:
            application/json:
              examples:
                Não encontrado:
                  value:
                    timestamp: 2021-07-28T12:41:31.887+00:00
                    status: 404
                    error: Not Found
                    message: ""
                Posição não encontrada:
                  value:
                    errors:
                      - code: 404
                        message: There is no operation file for account
          description:
            "Não encontrado, caso url do enpoint seja inválida , ou nã\
            o exista posição para o parceiro informado"
        "400":
          content:
            application/json:
              examples:
                Erro de Validação:
                  value:
                    status: 400
                    title: errors.validation
                    meta:
                      globalErrors:
                        - code:
                            "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211\
                            \ - request:idPartnerRequest:9659] is already been being\
                            \ processed"
                          message:
                            "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211\
                            \ - request:idPartnerRequest:9659] is already been being\
                            \ processed"
          description: Requisição com erro de validação
  /api/v1/operation-history/monthly/{accountNumber}:
    get:
      tags:
        - get-movements-by-account-monthly
      summary: "Recupera as movimentações da conta no último mês mais o mês corrente"
      description: |
        **Este relatório pode trazer até D-60, dependendo do dia da solicitação.**

        Endpoint responsável pela busca de movimentações de uma conta, considerando o mês anterior completo mais os dias do mês corrente.

        ***Exemplo:***

        Chamando o endpoint no dia 12/03/2025, as datas inicial e final serão, respectivamente, "2025-02-01" e "2025-03-12".
        Havendo movimentações neste período, o arquivo será gerado e a mensagem para recuperação do relatório será entregue via webhook.

        Após a requisição ser realizada com sucesso, os dados ficarão **estáticos por 12h**. 

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Movimentações por conta (operations-by-account)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        ---
        **Características:**

        Tipo de chamada: Assíncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: Mês anterior ao corrente + dias do mês corrente
      parameters:
        - name: fetch_current_account
          description: |
            Flag para trazer informações de Conta Corrente (Por default este valor é "true"). 
            Deve ser passado no Headers apenas quando quiser passar "true", caso contrário não deve ser informado.

            Exemplo: `no_value`
          schema:
            type: string
          in: header
          required: false
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: |
            Número da conta para buscar resumo da posição.
            
            Example: `001234567`
          schema:
            type: string
          in: path
          required: true
      responses:
        "202":
          description: Accepted
        "500":
          content:
            application/json:
              examples:
                Erro interno:
                  value:
                    errors:
                      - code: 500
                        message: Internal Server error for partner with cnpj 12456461
          description: "Erro interno, o administrador da API deverá ser informado."
        "401":
          content:
            application/json:
              examples:
                Não autorizado:
                  value:
                    status: 401
                    title: Unable to process the request
                    meta:
                      globalErrors:
                        - code: Authorization Error
                          message:
                            "access_token: The Token has expired on Wed Jul 28\
                            \ 12:49:16 UTC 2021."
          description: Token de acesso não autorizado
        "404":
          content:
            application/json:
              examples:
                Não encontrado:
                  value:
                    timestamp: 2021-07-28T12:41:31.887+00:00
                    status: 404
                    error: Not Found
                    message: ""
                Posição não encontrada:
                  value:
                    errors:
                      - code: 404
                        message: There is no operation file for account
          description:
            "Não encontrado, caso url do enpoint seja inválida , ou nã\
            o exista posição para o parceiro informado"
        "400":
          content:
            application/json:
              examples:
                Erro de Validação:
                  value:
                    status: 400
                    title: errors.validation
                    meta:
                      globalErrors:
                        - code:
                            "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211\
                            \ - request:idPartnerRequest:9659] is already been being\
                            \ processed"
                          message:
                            "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211\
                            \ - request:idPartnerRequest:9659] is already been being\
                            \ processed"
          description: Requisição com erro de validação
