  /api/v1/operation-history/period:
    post:
      tags:
        - post-movements-by-partner-and-period
      summary: "Solicita as movimentações de todas as contas do parceiro por um período"
      description: |
        Endpoint responsável pela busca de movimentações de todas as contas, por escritório e período. 
        O formato esperado é ano-mês (yyyy-MM) e a busca será feita para o mês completo (do primeiro dia do mês, até o último), considerando o limite da janela de dados permitida,
         onde o **período precisa ser anterior ao primeiro dia do mês anterior ao mês corrente.**

        ***Exemplo 1:***

        Chamando o endpoint no dia 12/03/2025, informando o período "2025-02".
        Será enviada uma mensagem via webhook informando que o período é inválido porque não foi respeitado o limite da janela de dados.

        ***Exemplo 2:***

        Chamando o endpoint no dia 12/03/2025, informando o período "2025-01", as datas inicial e final serão, respectivamente, "2025-01-01" e "2025-01-31".
        Havendo movimentações neste período, o arquivo será gerado e a mensagem para recuperação do relatório será entregue via webhook.

        **Não inclui contas de tipo Fundos, apenas contas tipo Investimento**

        Após a requisição ser realizada com sucesso, os dados ficarão **estáticos por 12h**. 
        Caso realize uma nova chamada com um novo período, será gerado um novo relatório sem sobrescrever o anterior ainda válido.

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, 
        que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Movimentações por Parceiro (operations-by-partner)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`
         
        ---
        **Características:**

        Tipo de chamada: Assíncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: D-x até o mês anterior ao corrente
      parameters:
        - name: fetch_current_account
          description: |
            Flag para trazer informações de Conta Corrente (Por default este valor é "true"). 
            Deve ser passado no Headers apenas quando quiser passar "true", caso contrário não deve ser informado.

            Exemplo: `no_value`
          schema:
            type: string
          in: header
          required: false
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperationHistoryPartner"
      responses:
        "202":
          description: Accepted
        "500":
          content:
            application/json:
              examples:
                Erro interno:
                  value:
                    errors:
                      - code: 500
                        message: Internal Server error for partner with cnpj 12456461
          description: "Erro interno, o administrador da API deverá ser informado."
        "401":
          content:
            application/json:
              examples:
                Não autorizado:
                  value:
                    status: 401
                    title: Unable to process the request
                    meta:
                      globalErrors:
                        - code: Authorization Error
                          message:
                            "access_token: The Token has expired on Wed Jul 28\
                            \ 12:49:16 UTC 2021."
          description: Token de acesso não autorizado
        "404":
          content:
            application/json:
              examples:
                Não encontrado:
                  value:
                    timestamp: 2021-07-28T12:41:31.887+00:00
                    status: 404
                    error: Not Found
                    message: ""
                Posição não encontrada:
                  value:
                    errors:
                      - code: 404
                        message: There is no operation file for account
          description: "Não encontrado, caso url do enpoint seja inválida , ou não existe retorno de operação para a conta ou o período informados"
        "400":
          content:
            application/json:
              examples:
                Erro de Validação:
                  value:
                    status: 400
                    title: errors.validation
                    meta:
                      globalErrors:
                        - code:
                            "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211\
                            \ - request:idPartnerRequest:9659] is already been being\
                            \ processed"
                          message:
                            "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211\
                            \ - request:idPartnerRequest:9659] is already been being\
                            \ processed"
          description: Requisição com erro de validação
