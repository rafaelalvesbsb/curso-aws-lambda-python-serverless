    OperationRequest:
      title: Request - Movimentações históricas por conta
      type: object
      properties:
        startDate:
          description: "Data inicial da pesquisa"
          example: "2021-03-18"
          pattern: "YYYY-MM-DD"
          type: string
        endDate:
          description: "Data final da pesquisa"
          example: "2021-03-19"
          pattern: "YYYY-MM-DD"
          type: string
    OperationPartnerRequest:
      title: Request - Movimentações por parceiro
      type: object
      properties:
        date:
          description: "Data que deseja consultar todas as movimentações"
          example: "2022-08-19"
          pattern: "YYYY-MM-DD"
          type: string
    RequestHistoryOperationsMarketAndAsset:
      title: Request - Movimentações históricas por mercado e ativo
      description: Exemplo de Payload passado no body da requisição
      required:
        - asset
        - assetCode
        - marketName
        - subMarketName
      type: object
      properties:
        marketName:
          type: string
          description: Nome do mercado (Campo Obrigatório)
          example: RF
        subMarketName:
          type: string
          description: Nome do subMercado (Campo Obrigatório)
          example: COE
        asset:
          type: string
          description: Ativo (Campo Obrigatório)
          example: ITUB3
        assetCode:
          type: string
          description: Código do Ativo
          example: "4513708"
        startDate:
          type: string
          description: Data de ínicio do período desejado (yyyy-MM-dd)
          format: string
          example: "2022-01-01"
        endDate:
          type: string
          description: Date de final do período desejado (yyyy-MM-dd)
          format: string
          example: "2022-01-30"
    ResponseError:
      description: Exemplo de payload de retorno em casos de erro
      type: object
      properties:
        status:
          type: integer
          format: int32
        title:
          type: string
        meta:
          $ref: "#/components/schemas/ErrorMetadata"
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ErrorMetadata:
      type: object
      properties:
        globalErrors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
        fieldErrors:
          type: object
          additionalProperties:
            type: object
