      summary: Busca relatório gerencial de posições.
      description: |
        Endpoint responsável pela busca de relatório gerencial posições do escritório, respeitando a vigência informada no legado, do último dia, e retornara a posição tanto D0(a data da chamada) quando D-1(dia anterior a chamada).

