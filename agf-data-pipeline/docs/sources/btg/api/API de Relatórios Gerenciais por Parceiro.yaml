  /api/v1/rm-reports/monthly-movement:
    post:
      tags:
        - post-rm-reports-monthly-movement
      summary: Busca relatório gerencial de Fechamento de Movimentação Mensal do parceiro
      description: |
        Endpoint responsável pela busca de relatório gerencial de Fechamento de Movimentação Mensal do parceiro. 

        O arquivo contém as movimentações de um determinado mês do escritório e deve ser solicitado quando existir a necessidade de carga com possíveis correções ou mudanças.

        O escritório pode solicitar qualquer mês retroagindo até 12 meses da data atual, e **o mês anterior após o sétimo dia do mês corrente**.

        ***O arquivo é gerado e enviado uma única vez após sua solicitação, sob demanda, mas pode ser solicitado novamente.***

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Relatório de Fechamento de Movimentação Mensal (rm-reports-monthly-movement)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        ---
        **Características:**

        Tipo de chamada: Assíncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: N/A *(Não se Aplica)* 

        Janela de dados: Limite máximo de 12 meses retroativos ao mês atual

      operationId: getMonthlyMovement
      parameters:
        - name: x-id-partner-request
          in: header
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          required: true
          schema:
            type: string
        - name: access_token
          in: header
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefDateRequestDTO"
        required: true
      responses:
        "202":
          description: Requisição recebida com sucesso.
        "400":
          description: Header ou Body incorretos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "401":
          description: Requisição não autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "403":
          description: Erro no body da requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
