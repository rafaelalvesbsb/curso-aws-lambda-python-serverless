      summary: Busca relatório gerencial Open Finance.
      description: |
        Endpoint responsável pela busca de relatório gerencial com as informações das contas com PL fora do BTG, por mercado e ativo.

        Possui o conceito de posições transmitidas e recebidas, podendo **duplicar** a posição de acordo com o número de instituições 
        a quem se transmitem os dados, mas uma única vez para recebimento, **independente da quantidade** de instituições que entreguem a informação.
        
        *Exemplo 1:*

        Em transmissões para três bancos diferentes, o BTG possuirá três linhas iguais no relatório, uma para cada instituição.

        *Exemplo 2:*

        Em transmissão para um único banco mais o recebimento por dois bancos diferentes, o BTG possuirá 
        duas linhas no relatório, sendo uma correspondente à transmissão e outra ao recebimento.
        
