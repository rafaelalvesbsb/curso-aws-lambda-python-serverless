  /api/v1/rm-reports/account-limit:
    get:
      tags:
        - get-rm-reports-account-limit
      summary: Busca relatório gerencial de limite operacional da conta.
      description: |
        Endpoint responsável pela busca de relatório gerencial com informações de limite total da conta, mais garantia.

        ***O arquivo só será gerado na janela seguinte à data e horário da assinatura do Webhook (se houverem dados). E sempre será retornado o último arquivo gerado.***

        *Exemplo:*

        *Assinando o Webhook no dia 16/06/2023 às 20h30: Deve-se aguardar a próxima janela para fazer a requisição na API ou será emitido um erro de forma assíncrona via Webhook com a seguinte mensagem:*

        `Relatório não disponível. Por favor, aguarde a próxima janela de execução.`

        *O arquivo só será gerado na janela seguinte (17/06/2023, às 8hrs) e o erro para de acontecer, pois passará a retornar a última versão disponível.*

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, 
        com nome de **Limite Operacional de Conta (rm-reports-account-limit)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        ---
        **Características:**

        Tipo de chamada: Assíncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: 1x ao dia, às 07h30

        Janela de dados: N/A *(Não se Aplica)*

      operationId: getAccountLimit
      parameters:
        - name: x-id-partner-request
          in: header
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          required: true
          schema:
            type: string
        - name: access_token
          in: header
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Requisição recebida com sucesso.
        "400":
          description: Header ou Body incorretos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "401":
          description: Requisição não autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "403":
          description: Erro no body da requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
