components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ErrorMetadata:
      type: object
      properties:
        globalErrors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
        fieldErrors:
          type: object
          additionalProperties:
            type: object
    ResponseError:
      type: object
      properties:
        status:
          type: integer
          format: int32
        title:
          type: string
        meta:
          $ref: "#/components/schemas/ErrorMetadata"
    RefDateRequestDTO:
      title: refDateRequest
      required:
        - refMonth
        - refYear
      type: object
      properties:
        refMonth:
          pattern: "MM"
          type: string
          description: O mês de referência (Campo Obrigatório)
          example: "01"
        refYear:
          pattern: "YYYY"
          type: string
          description: O ano de referência (Campo Obrigatório)
          example: "2023"
    RefDatePositionRequestDTO:
      title: refDatePositionRequest
      required:
        - refDay
        - refMonth
        - refYear
      type: object
      properties:
        refDay:
          pattern: "dd"
          type: string
          description: O dia de referência (Campo Obrigatório)
          example: "01"
        refMonth:
          pattern: "MM"
          type: string
          description: O mês de referência (Campo Obrigatório)
          example: "01"
        refYear:
          pattern: "YYYY"
          type: string
          description: O ano de referência (Campo Obrigatório)
          example: "2024"
    ExampleResponse:
      title: Exemplo de Retorno - Banking
      description: |
        Dicionário de dados - API de dados Banking

        Este é o dicionário de dados com os possíveis valores de retorno.
        O arquivo final terá formato .CSV com os seguintes campos:

        ---
      properties:
        nr_conta:
          type: string
          description: Número da conta investimento
          example: "001234567"
        nome_representante:
          type: string
          description: Primeiro Nome do representante da conta
          example: "João Maria"
        termo_consentimento:
          type: string
          description: Flag indicando se cliente possui termo de consentimento assinado
          example: "Sim"
        fopa:
          type: string
          description: Empresas que pagam a Folha de Pagamento pelo BTG.
          example: "BANCO"
        tipo_conta:
          type: string
          description: Tipo da conta (Corrente ou Salário)
          example: "Conta Corrente"
        primeira_ativacao_conta:
          type: string
          description: Flag indicando se cliente já efetuou em algum momento uma transação com o cartão de crédito, débito ou fez uma transferência.
          example: "Sim"
        conta_ativa_30dd:
          type: string
          description: Flag indicando se cliente fez alguma transação de débito ou possui conta corrente ativa nos últimos 30 dias.
          example: "Sim"
        cartao:
          type: string
          description: Apresentará "Contratado - Tipo" para o cartão que o cliente possuir, e "oferta - Tipo" para o cartão sugerido.
          example: "Contratado - Exemplo"
        pap_clean_cartao:
          type: string
          description: Limite ofertado no cartão de crédito.
          example: "De 00k a 10K"
        pap_lastreado_cartao:
          type: string
          description: Limite ofertado no cartão de crédito com garantia de pagamento do investflex "investimento".
          example: "De 00k a 10K"
        c_clean_cartao:
          type: string
          description: Limite que o cliente possui no cartão de crédito.
          example: "De 00k a 3K"
        c_lastreado_cartao:
          type: string
          description: Limite que o cliente possui no cartão de crédito com garantia de pagamento do investflex "investimento".
          example: "De 00k a 3K"
        primeira_ativacao_cartao:
          type: string
          description: Flag indicando se é a primeira transação do cartão virtual ou físico.
          example: "Sim"
        cartao_ativa_30dd:
          type: string
          description: Flag indicando se houve alguma transação de crédito nos últimos 30 dias.
          example: "Sim"
        cheque_aprovado:
          type: string
          description: Cheque especial Aprovado.
          example: "de 0 a 3k"
        cheque_contratado:
          type: string
          description: Limite do cheque especial contratado.
          example: "100"
        cp_contratado:
          type: string
          description: Crédito pessoal contratado.
          example: "3000"
        prioridade_contato_cp:
          type: string
          description: Apresenta se o cliente realizou uma simulação de cheque pessoal e se é alto propenso a adquirir o crédito pessoal.
          example: "Fez simulação CP 15+ dias"
        cobranca:
          type: string
          description: Cliente com algum produto em atraso. "Limite mais, Crédito pessoal e outros".
          example: "Em dia"
        saldo_banking:
          type: string
          description: Saldo que o cliente tem atualmente no banco.
          example: "0"
        prog_relacionamento:
          type: string
          description: Programa de relacionamento existente no cartão. Como Cashback, Bonus esfera ou livelo.
          example: "Cashback"
        seguro_vida:
          type: string
          description: Indica se o seguro de vida foi contratado.
          example: "Contratado"
        seguro_conta_cartao:
          type: string
          description: Indica se o seguro de Conta Cartão foi contratado.
          example: "Contratado"
        seguro_prestamista:
          type: string
          description: Indica se o seguro de prestamista foi contratado.
          example: "Não Contratado"
        assessor:
          type: string
          description: Assessor	Assessor responsável pela carteira do cliente.
          example: "João José"
        cd_cge_partner:
          type: string
          description: CGE do parceiro vinculado a conta
          example: "999999"
        dt_abertura_conta:
          type: string
          description: Data de Abertura da Conta
          example: "2024-05-24"
        dt_aquisicao_cartao:
          type: string
          description: Data de aquisição do cartão
          example: "2024-06-04"
        termo_cons_simplificado:
          type: string
          description: Flag indicando se o termo de consentimento foi aceito
          example: "sim"
        cons_produto_serviço:
          type: string
          description: Flag indicando se o termo de consentimento foi aceito
          example: "sim"
        vl_auc_total:
          type: number
          description: Valor total
          example: 1122.33
        venda_via_portal:
          type: string
          description: Informação sobre disponibilidade da venda
          example: "Venda Disponível"
        carr_abandonado_cartao:
          type: string
          description: Flag indicando se o carrinho foi abandonado com cartão preenchido
          example: "Sim"
        cliente_heavy_user:
          type: string
          description: Flag indicando se o cliente é um Heavy User
          example: "Sim"
        cp_carr_abandonado:
          type: string
          description: Flag indicando se o carrinho foi abandonado
          example: "Sim"
        deb_automático:
          type: string
          description: Flag indicando se existe cadastro de débito automático
          example: "Sim"
        portabilidade:
          type: string
          description: Flag indicando se houve portabilidade
          example: "Sim"
        chave_pix:
          type: string
          description: Chave Pix do cadastrada
          example: "Chave pix"
        modulo_viagem:
          type: string
          description: Flag de Modulo viagem
          example: "Sim"
        modulo_seguranca:
          type: string
          description: Flag de Modulo segurança
          example: "Não"
        modulo_transacional:
          type: string
          description: Flag de Modulo transacional
          example: "Não"
        modulo_investimento:
          type: string
          description: Flag de Modulo investimento
          example: "Não"
