openapi: 3.0.1
info:
  title: API de posição de contas do tipo fundo
  description: API de consulta de Posições do tipo fundo.
  version: 3.1.4.0
servers:
  - url: https://api.btgpactual.com/iaas-investment-consolidation
paths:
  /api/v1/fund-account/position/{accountNumber}:
    get:
      tags:
        - get-fund-position-by-account
      description: |
        Recupera em tempo real o resumo de investimento (PositionData) de uma conta fundo

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: D0
      parameters:
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: | 
            Número da conta para buscar resumo da posição.

            *Exemplo:* `000123456`
          schema:
            type: string
          in: path
          required: true
      responses:
        "200":
          description: Requisição enviada com sucesso.
          headers:
            x-id-pactual:
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataDTO"
        "401":
          description: Requisição não autorizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "400":
          description: Erro nos parâmetros da requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Sem resultado na requisição.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
    post:
      tags:
        - post-fund-position-by-account
      description: |
        Recupera em tempo real o resumo de investimento (PositionData) de uma conta fundo na data informada.

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: N/A *(Não se Aplica)*
      parameters:
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: |
            Número da conta para buscar resumo da posição.

            *Exemplo:* `000123456`
          schema:
            type: string
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionFilterDTO"
        required: true
      responses:
        "200":
          description: Requisição enviada com sucesso.
          headers:
            x-id-pactual:
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataDTO"
        "401":
          description: Requisição não autorizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "400":
          description: Erro nos parâmetros da requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Sem resultado na requisição.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
components:
