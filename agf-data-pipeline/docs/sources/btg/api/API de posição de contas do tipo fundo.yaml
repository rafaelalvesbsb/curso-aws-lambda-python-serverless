          example: BBAS3
        securityCode:
          type: number
          format: int32
          description: Codigo do ativo
          example: 1235
        maturityDate:
          type: string
          description: Data de vencimento
          example: 2021-07-28T21:52:23Z
        collateralQuantity:
          type: number
          description: Quantidade
          example: 23.10
        collateraldescription:
          type: string
          description: Descrição
          example: example
        marketPrice:
          type: number
          description: Preço de mercado
          example: 0.1
        marketValue:
          description: Valor de mercado
          type: number
          example: 0.1
        initialInvestmentValue:
          description: . Valor inicial de investimento
          type: number
          example: 0.1
    DataDTO:
      type: object
      properties:
        currency:
          type: string
          description: Moeda
          example: BRL
        totalAmmount:
          type: string
          description: Valor total
          example: 0.1
        accountNumber:
          type: string
          description: Numero da conta
          example: 123456789
        positionDate:
          type: string
          description: Data da posição
          example: 2021-07-28T21:52:23Z
        eventCreateDate:
          type: string
          description: Data de criação do evento
          example: 2021-07-28T21:52:23Z
        consolidateDate:
          type: string
          description: Data da consolidação
          example: 2021-07-28T21:52:23Z
        ptaxPricing:
          $ref: "#/components/schemas/PtaxPricingDTO"
        investments:
          type: array
          items:
            $ref: "#/components/schemas/investments"
        summaryAccounts:
          type: array
          items:
            $ref: "#/components/schemas/summaryAccounts"
        institutions:
          type: array
          items:
            $ref: "#/components/schemas/institutions1"
        summaryInstitutions:
          $ref: "#/components/schemas/SummaryInstitutions"
        summaryCurrencies:
          type: array
          items:
            $ref: "#/components/schemas/SummaryCurrencie"
    FixedIncome:
      type: object
      properties:
        accountingGroupCode:
          type: string
          description: Codigo do grupo
          example: 10
        issuer:
          description: Emissor da renda fixa.
          type: string
          example: "BANCO BTG PACTUAL S A"
        issueDate:
          description: data de emissão da renda fixa.
          type: string
          example: "2023-08-22T00:00:00-03:00"
        securityCode:
          description: Código do ativo
          type: string
          example: "715270"
        issuerCGECode:
          description: Código interno (CGE) do Emissor
          type: string
          example: "354689"
        priceType:
          description: tipo de precificação
          type: number
          example: 200
        valueType:
          description: valor do tipo de precificação
          type: string
          example: "Boleta (Cliente)"
        yield:
          description: rendimento de renda fixa
          type: number
          example: 0.0
        ticker:
          description: Símbolo do ativo
          type: string
          example: "NTNB-P"
        referenceIndexName:
          description: Indíce de referência
          type: string
          example: "IPCA"
        referenceIndexValue:
          description: Valor do indíce de referência
          type: string
          example: "100% IPCA"
        indexYieldRate:
          description: Taxa de rendimento do índice
          type: string
          example: "102,50% do CDI"
        maturityDate:
          description: Data de vencimento
          type: string
          example: "2021-07-28T21:52:23Z"
        quantity:
          description: Quantidade
          type: number
          example: 0.1
        price:
          description: Preço
          type: number
          example: 0.1
        grossValue:
          description: Valor bruto
          type: number
          example: 0.1
        incomeTax:
          description: Imposto de renda
          type: number
          example: 0.1
        iOFTax:
          description: IOF
          type: number
          example: 0.1
        netValue:
          description: Valor líquido
          type: number
          example: 0.1
        isLiquidity:
          description: Indicador se o ativo está em período de liquidez diária
          type: string
          example: "false"
        acquisitions:
          type: array
          items:
            $ref: "#/components/schemas/acquisition"
        ftsId:
          description: Identificador do FTS.
          type: string
          example: "12345678"
        isRepo:
          description: Flag indicando se é repo.
          type: string
          example: "false"
        cetipCode:
          description: código Cetip.
          type: string
          example: "CDB123AZ"
        selicCode:
          description: Código Selic.
          type: string
          example: "354689"
        isin:
          description: Número de Identificação de Valores Mobiliários Internacionais
          type: string
          example: "ABCDEFGHI001"
        taxFree:
          description: flag indicando se é livre de taxas.
          type: string
          example: "false"
        issuerType:
          description: tipo de emissor
          type: string
          example: "Titulo Privado"
        projection:
          description: Projeção.
          type: string
        lag:
          description: Atraso
          type: string
        incomeDefault:
          description: flag indicando se é padrão.
          type: string
          example: "false"
        yieldAvg:
          description: Rendimento médio.
          type: number
          example: 0.1
        debtEarlyTerminationSchedules:
          description: Número de Identificação de Valores Mobiliários Internacionais
          type: array
          items:
            $ref: "#/components/schemas/debtEarlyTerminationSchedules"
        assetProduct:
          type: array
          items:
            $ref: "#/components/schemas/AssetProductDTO"
        collateralPosition:
          type: array
          items:
            $ref: "#/components/schemas/CollateralPositionDTO"
    ForeignExchangeDTO:
