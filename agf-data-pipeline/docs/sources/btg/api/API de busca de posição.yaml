openapi: 3.0.2
info:
  title: API de busca de posição
  version: 0.0.1
  description: |
    API para buscar dados relacionados a posição de uma conta.
servers:
  - url: https://api.btgpactual.com/iaas-api-position
paths:
  /api/v1/position/{account_number}:
    get:
      tags:
        - get-position-by-account
      parameters:
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: |
            Número da conta para buscar resumo da posição.
            
            Example: `001234567`
          schema:
            type: string
          in: path
          required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Position"
          description: Successful response
          headers:
            x-id-pactual:
              schema:
                type: string
                example: 2ffb9cfb-8dae-4956-b8d9-8d04ff5823ee
              description: Identificador único da requisição
        "500":
          content:
            application/json:
              examples:
                Erro interno:
                  value:
                    errors:
                      - code: 500
                        message: Internal Server error for partner with cnpj 12456461
          description: "Erro interno, o administrador da API deverá ser informado."
        "401":
          content:
            application/json:
              examples:
                Não autorizado:
                  value:
                    status: 401
                    title: Unable to process the request
                    meta:
                      globalErrors:
                        - code: Authorization Error
                          message: "access_token: The Token has expired on Wed Jul 28 12:49:16 UTC 2021."
          description: Token de acesso não autorizado
        "404":
          content:
            application/json:
              examples:
                Não encontrado:
                  value:
                    timestamp: 2021-07-28T12:41:31.887+00:00
                    status: 404
                    error: Not Found
                    message: ""
                    path: /api/v1/operation/partner/positions3
                Posição não encontrada:
                  value:
                    errors:
                      - code: 404
                        message: There is no position for partner with cnpj 10010
          description:
            "Não encontrado, caso url do enpoint seja inválida , ou nã\
            o exista posição para a conta informada"
        "400":
          content:
            application/json:
              examples:
                Erro de Validação:
                  value:
                    status: 400
                    title: errors.validation
                    meta:
                      globalErrors:
                        - code: "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211 - request:idPartnerRequest:9659] is already been being processed"
                          message: "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211 - request:idPartnerRequest:9659] is already been being processed"
          description: Requisição com erro de validação
      operationId: getAccountPositions
      summary: Busca de posições por conta.
      description: |
        Recupera em tempo real o resumo de investimento (PositionData) de uma conta

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 120 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: D0
    post:
      tags:
        - post-position-by-account-and-date
      parameters:
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: |
            Número da conta para buscar resumo da posição.
            
            Example: `001234567`
          schema:
            type: string
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionDateRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionData"
          description: Successful response
          headers:
            x-id-pactual:
              schema:
                type: string
                example: 2ffb9cfb-8dae-4956-b8d9-8d04ff5823ee
              description: Identificador único da requisição
        "500":
          content:
            application/json:
              examples:
                Erro interno:
                  value:
                    errors:
                      - code: 500
                        message: Internal Server error for partner with cnpj 12456461
          description: "Erro interno, o administrador da API deverá ser informado."
        "401":
          content:
            application/json:
              examples:
                Não autorizado:
                  value:
                    status: 401
                    title: Unable to process the request
                    meta:
                      globalErrors:
                        - code: Authorization Error
                          message: "access_token: The Token has expired on Wed Jul 28 12:49:16 UTC 2021."
          description: Token de acesso não autorizado
        "404":
          content:
            application/json:
              examples:
                Não encontrado:
                  value:
                    timestamp: 2021-07-28T12:41:31.887+00:00
                    status: 404
                    error: Not Found
                    message: ""
                    path: /api/v1/operation/partner/positions3
                Posição não encontrada:
                  value:
                    errors:
                      - code: 404
                        message: There is no position for partner with cnpj 10010
          description: "Não encontrado, caso url do enpoint seja inválida , ou não exista posição para a conta informada"
        "400":
          content:
            application/json:
              examples:
                Erro de Validação:
                  value:
                    status: 400
                    title: errors.validation
                    meta:
                      globalErrors:
                        - code: "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211 - request:idPartnerRequest:9659] is already been being processed"
                          message: "The request [request:idPactual:1bf31486-f467-4ab6-a453-fd0420de8211 - request:idPartnerRequest:9659] is already been being processed"
          description: Requisição com erro de validação
      operationId: postPositionsByAccountAndDate
      summary: Busca de posições por conta e data.
      description: |
        Recupera em tempo real o resumo de investimento (PositionData) de uma conta na data informada.

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 120 por minuto

        Frequência de atualização: Tempo real

        Janela de dados: N/A *(Não se Aplica)*
