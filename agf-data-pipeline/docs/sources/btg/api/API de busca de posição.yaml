            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
        - name: accountNumber
          description: |
            Número da conta para buscar resumo da posição.
            
            Example: `001234567`
          schema:
            type: string
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionPeriodFilter"
        required: true
      responses:
        "202":
          description: Requisição recebida com sucesso.
        "400":
          description: Header ou Body incorretos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "401":
          description: Requisição não autorizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "403":
          description: Erro no body da requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
  /api/v2/position/unit-price/history/{accountNumber}:
    get:
      tags:
        - get-position-history-unit-price-by-account-v2
      summary: Busca histórica de preço unitário (PU) por conta de renda fixa.
      description: |
        Endpoint responsável pela busca de histórico de preço unitário por conta.

        A busca será disponibilizada em cache por uma semana (7 dias). 

        Após expirar os 7 dias a consulta poderá ser executada novamente.

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Posições por Conta V2 (positions-by-account-v2)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 1 a cada 30 minutos.

        Frequência de atualização: Uma vez por semana

        Janela de dados: D0

