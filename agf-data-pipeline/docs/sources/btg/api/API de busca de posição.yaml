      operationId: getPartnerPositions
      summary: Busca de posições por parceiro.
      description: |
        Recupera um objeto JSON (PositionDownloadData) que contém uma URL para download do arquivo no formato zip. 

        Esse arquivo, por sua vez, possui o resumo da posição (PositionData) de todas as contas em **D0**.

        **Não inclui contas de tipo Fundos, apenas contas tipo Investimento**

        **Necessário realizar a chamada do endpoint get-position-by-partner-refresh para que este arquivo seja atualizado.**

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: Necessário realizar a chamada do endpoint **get-position-by-partner-refresh** para que este arquivo seja atualizado.

        Janela de dados: D0
  /api/v2/position/unit-price/{accountNumber}:
    post:
      tags:
        - post-position-unit-price-by-account-v2
      summary: Busca de preço unitário (PU) por conta e período de renda fixa
      description: |
        Endpoint responsável pela busca do resumo de investimento de Renda Fixa de uma conta, por período.

        A busca será disponibilizada em cache por doze horas (12 horas). 

        Após expirar as 12 horas a consulta poderá ser executada novamente.

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Posições por Conta V2 (positions-by-account-v2)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        ---
        **Características:**

        Tipo de chamada: Síncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: A cada 12 horas

        Janela de dados: N/A *(Não se Aplica)*

      operationId: v2getFixedIncomeHistoryByAccountAndPeriod
      parameters:
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

