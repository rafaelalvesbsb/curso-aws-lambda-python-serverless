                $ref: "#/components/schemas/ResponseError"
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ErrorMetadata:
      type: object
      properties:
        globalErrors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
        fieldErrors:
          type: object
          additionalProperties:
            type: object
    ResponseError:
      type: object
      properties:
        status:
          type: integer
          format: int32
        title:
          type: string
        meta:
          $ref: "#/components/schemas/ErrorMetadata"
    FixedIncomeHistory:
      description: Lista de Contas
      type: object
      properties:
        accounts:
          type: array
          example:
            - "123456789"
            - "000123456"
            - "008765432"
            - "999777666"
          items:
            $ref: "#/components/schemas/AccountsFilter"
    AccountsFilter:
      description: Conta para filtro
      type: string
      example: "001234567"
    PositionPeriodFilter:
      required:
        - endDate
        - startDate
      type: object
      properties:
        startDate:
          type: string
          description: Position start date
          format: date
          example: "2018-01-01"
        endDate:
          type: string
          description: Position end date
          format: date
          example: "2018-01-30"
    PositionDateFilter:
      required:
        - date
      type: object
      properties:
        date:
          type: string
          description: Position date
          example: "2022-03-10"
    PositionDateRequest:
      description: Requisição para busca de posição de conta por data.
      type: object
      properties:
        date:
          description: Data da posição desejada na consulta.
          type: string
          example: "2021-07-29"
    PositionDownloadData:
      description: Dados para download do arquivo zip contendo o resumo de todas as posições vinculadas ao parceiro. Cada resumo de posição é reprensentado pelo PositionData.
      type: object
      properties:
        url:
          description: Url pré assinada para donwload arquivo no formato zip contendo o resumo de posição das contas vinculadas ao parceiro.
          type: string
          example: "https://invest-repors-prd.s3.amazonws.com/iaas-position-holder/12345678912/position-zip/20210727_123456_12345678912_position.zip?X-Amz-SecurityToken=IQoJb3pZsaduhadihsd%b#jaskdbsajkdbsadkajasdb-Amz-Algorithm=AWS4-HMAC-HAJH&AA%-Amz-Date=20210727T185114Z-Amz-SignedHeader=host&X-Amz-Expires=846400&X-Amz=8bea09896786786e7879f7987c22b324cedhge"
        dateTime:
          description: Data e hora da geração da url.
          type: string
          example: "2021-07-29T18:00:00Z"
        numberOfAccounts:
          description: Quantidade de contas contidas no arquivo zip.
          type: integer
          example: 1
        fileSize:
          format: int32
          description: Tamanho do Arquivo em bytes
          type: integer
          example: 613
    PositionPURequest:
      description: Dados de filtro para a busca de histórico de preço unitário.
      type: object
      properties:
        startDate:
          description: Data início
          type: string
          example: "2022-01-01"
        endDate:
          description: Data fim
          type: string
          example: "2022-01-31"
    PositionData:
      description: dados da posição de cada conta contida no PositionDownloadData.
      type: object
      properties:
        AccountNumber:
          description: número da conta do cliente
          type: string
          example: "000123456"
        PositionDate:
          description: data da posição, mesmo que a data não seja o dia corrente, ela é sempre a posição mais atual
          type: string
          example: "2021-07-29"
        Position:
          $ref: "#/components/schemas/Position"
          description: dados da posição
          type: object
    Position:
      description: dados da posição
      type: object
      properties:
        ContractVersion:
          description: número da versão de contrato exibida
          type: string
          example: 1
        AccountNumber:
          description: número da conta do cliente
          type: string
          example: "000123456"
        Agency:
          description: número da agência de conta investimento
          type: string
          example: 1
        PositionDate:
          description: data da posição
          type: string
          example: "2021-07-29T18:51:13Z"
        TotalAmount:
          description: total em reais da conta do cliente, o valor pode ser negativo ou positivo. Esse valor, corresponde ao Patrimônio Total que pode ser visualizado pelo cliente no portal.
          type: string
          example: "-212.77"
        SummaryAccounts:
          description: resumo da posição do cliente de cada mercado que possui posição.
          type: array
          items:
            $ref: "#/components/schemas/SummaryAccount"
        InvestmentFund:
          description: Fundos de investimento.
          type: array
          items:
            $ref: "#/components/schemas/InvestmentFund"
        FixedIncome:
          description: Renda fixa.
          type: array
          items:
            $ref: "#/components/schemas/FixedIncome"
        InvestmentFundCotaCetipada:
          description: Fundos de Investimento Externo.
          type: array
          items:
            $ref: "#/components/schemas/InvestmentFundCotaCetipada"
        Credits:
          description: Crédito.
          type: array
          items:
            $ref: "#/components/schemas/Credits"
        PensionInformations:
          description: Previdência.
          type: array
          items:
            $ref: "#/components/schemas/PensionInformations"
        Commodity:
          description: Commodities.
          type: array
          items:
            $ref: "#/components/schemas/Commodity"
        Equities:
          description: Renda Variável.
          type: array
          items:
            $ref: "#/components/schemas/Equities"
        Derivative:
          description: Derivativos.
          type: array
          items:
            $ref: "#/components/schemas/Derivative"
        FixedIncomeStructuredNote:
          description: COE.
          type: array
          items:
            $ref: "#/components/schemas/FixedIncomeStructuredNote"
        PayableReceivables:
          description: Contas a pagar.
          type: array
          items:
            $ref: "#/components/schemas/PayableReceivables"
        PendingSettlements:
          description: Valores em trânsito.
          type: array
          items:
            $ref: "#/components/schemas/PendingSettlements"
        CryptoCoins:
          description: Valores de Crypto Ativos
          type: array
          items:
            $ref: "#/components/schemas/CryptoCoins"
        Cash:
          description: Dinheiro.
          type: array
          items:
            $ref: "#/components/schemas/Cash"
        CashCollateralRoot:
          description: Margem em dinheiro.
          type: array
          items:
            $ref: "#/components/schemas/CashCollateralRoot"
        Precatories:
          description: Precatórios.
          type: array
          items:
            $ref: "#/components/schemas/Precatories"
        PrecatoriesCR:
          description: Precatórios CR.
          type: array
          items:
            $ref: "#/components/schemas/PrecatoriesCR"
    SummaryAccount:
      description: resumo da posição do cliente de cada mercado.
      type: object
      properties:
        MarketName:
          description: nome do mercado
          type: string
          example: "Conta Corrente"
          enum:
            [
              Conta Corrente,
              Fundos de Investimento,
              Margem em Dinheiro,
              Renda Fixa,
              Nota Estruturada,
              Previdência,
              Valores em Trânsito,
              Renda Variável,
              Derivativos,
              Crédito,
              Derivativos - Futuros,
              Commodities,
            ]
        MarketAbbreviation:
          description: abreviação do nome do mercado
          type: string
          example: "CC"
          enum: [CC, FN, CM, RF, COE, PREV, VT, RV, DRV, CR, DRV_Fut, co]
        PositionDate:
          description: data da posição do mercado, essa data pode ser anterior à PositionDate do objeto raiz.
          type: string
          example: "2021-07-28T21:52:23Z"
        EndPositionValue:
          description: valor em reais da posição no final do dia da data mencionada em PositionDate do nó SummaryAccounts. Podendo ser positivo ou negativo.
          type: string
          example: "81244.8"
        StartPositionValue:
          description: valor em reais da posição no início do dia da data mencionada em PositionDate do nó SummaryAccounts. Podendo ser positivo ou negativo.
          type: string
          example: "0.1"
    InvestmentFund:
      description: Fundos de investimentos internos
      type: object
      properties:
        ShareValue:
          description: Valor da cota.
          type: string
          example: "0.1"
        Fund:
          description: Fundo
          type: object
          properties:
            FundName:
              description: Nome do fundo.
              type: string
              example: "SPX NIMITZ FIC FI MULT ACCESS D"
            SecurityCode:
              description: Código do ativo.
              type: string
              example: "1573210"
            FundCGECode:
              description: Código CGE do fundo.
              type: string
              example: "518389"
            FundCNPJCode:
              description: CNPJ do fundo.
              type: string
              example: "29127763000180"
            DatePortfolio:
              description: Data do valor da cota.
              type: string
              example: "2021-02-17T00:00:00"
            ManagerName:
              description: Gestor do fundo.
              type: string
              example: "PACTUAL WM GESTAO DE RECURSOS LTDA"
            ManagerCGECode:
              description: código do gestor do fundo.
              type: string
              example: "323232"
            FundLiquidity:
              description: Liquidez do fundo.
              type: string
              example: "61"
            BenchMark:
              description: marca referência
              type: string
              example: "CDI"
            EsTipoPortfolio:
              description: Tipo de portfólio.
              type: string
              example: "20"
            TipoCvm:
              description: Tipo de CVM
              type: string
              example: "4"
            EntityType:
              description: Tipo de entidade (C ou 4)
              type: string
              example: "C"
            RelatedSecurityCodeClass:
              description: código de segurança relacionado à classe.
              type: string
              example: "354689"
            RelatedSecurityCodeFund:
              description: código de segurança relacionado ao fundo.
              type: string
              example: "354689"
            RelatedClassCGECode:
              description: código(CGE) relacionado à classe.
              type: string
              example: "354689"
            RelatedFundCGECode:
              description: código(CGE) relacionado ao fundo.
              type: string
              example: "354689"
        Acquisition:
          description: Aquisição.
          type: array
          items:
            $ref: "#/components/schemas/Acquisition"
        CotaCetipadaFundoExterno:
          description: flag indicando se cota é de fundo externo.
          type: string
          example: "false"
        PositionDate:
          description: Data da posição do fundo.
          type: string
          example: "2024-01-12T00:00:00Z"
        ProcessingDateTime:
          description: Data-hora de processamento.
          type: string
          example: "2024-01-15T14:06:42.606Z"
    Acquisition:
      description: Aquisições
      type: object
      properties:
        CostPrice:
          description: Preço de compra.
          type: string
          example: "0.1"
        IncomeTax:
          description: Imposto de renda.
          type: string
          example: "0.1"
        VirtualIOF:
          description: IOF.
          type: string
          example: "0.1"
        NetAssetValue:
          description: Saldo liquido.
          type: string
          example: "0.1"
        GrossAssetValue:
          description: Saldo bruto.
          type: string
          example: "0.1"
        AcquisitionDate:
          description: Data da aquisição.
          type: string
          example: "2021-07-28T21:52:23Z"
        NumberOfShares:
          description: Quantidade de cotas.
          type: string
          example: "0.1"
        AcquisitionNumber:
          description: Número da aquisição.
          type: string
          example: "1"
        OrigemAmortizacao:
          description: Flag indicando se é de origem amortização.
          type: string
          example: "false"
        CostValue:
          description: Valor de compra. Produto de NumberOfShare com CostPrice.
          type: string
          example: "0.1"
        CotaCetipada:
          description: Flag indicando se é cota cetipada.
          type: string
          example: "false"
    FixedIncome:
      description: Renda fixa.
      type: object
      properties:
        AccountingGroupCode:
          description: Código do agrupamento de contas.
          type: string
          example: "TESOURO DIRETO - NTNB-P"
        Issuer:
          description: Emissor da renda fixa.
          type: string
          example: "BANCO BTG PACTUAL S A"
        IssueDate:
          description: data de emissão da renda fixa.
          type: string
          example: "2023-08-22T00:00:00-03:00"
        SecurityCode:
          description: Código do ativo
          type: string
          example: "715270"
        IssuerCGECode:
          description: Código interno (CGE) do Emissor
          type: string
          example: "354689"
        PriceType:
          description: tipo de precificação
          type: string
          example: "2020"
        ValueType:
          description: valor do tipo de precificação
          type: string
          example: "Boleta (Cliente)"
        Yield:
          description: rendimento de renda fixa
          type: string
          example: "0.0"
        Ticker:
          description: Símbolo do ativo
          type: string
          example: "NTNB-P"
        ReferenceIndexName:
          description: Indíce de referência
          type: string
          example: "IPCA"
        ReferenceIndexValue:
          description: Valor do indíce de referência
          type: string
          example: "100% IPCA"
        IndexYieldRate:
          description: Taxa de rendimento do índice
          type: string
          example: "102,50% do CDI"
        MaturityDate:
          description: Data de vencimento
          type: string
          example: "2021-07-28T21:52:23Z"
        Quantity:
          description: Quantidade
          type: string
          example: "0.1"
        Price:
          description: Preço
          type: string
          example: "0.1"
        GrossValue:
          description: Valor bruto
          type: string
          example: "0.1"
        IncomeTax:
          description: Imposto de renda
          type: string
          example: "0.1"
        IOFTax:
          description: IOF
          type: string
          example: "0.1"
        NetValue:
          description: Valor líquido
          type: string
          example: "0.1"
        IsLiquidity:
          description: Indicador se o ativo está em período de liquidez diária
          type: string
          example: "false"
        Acquisitions:
          description: Aquisições
          type: array
          items:
            $ref: "#/components/schemas/Acquisitions"
        FTSId:
          description: Identificador do FTS.
          type: string
          example: "12345678"
        IsRepo:
          description: Flag indicando se é repo.
          type: string
          example: "false"
        CetipCode:
          description: código Cetip.
          type: string
          example: "CDB123AZ"
        SelicCode:
          description: Código Selic.
          type: string
          example: "354689"
        ISIN:
          description: Número de Identificação de Valores Mobiliários Internacionais
          type: string
          example: "ABCDEFGHI001"
        TaxFree:
          description: flag indicando se é livre de taxas.
          type: string
          example: "false"
