  /api/v1/position/refresh:
    get:
      tags:
        - get-position-by-partner-refresh
      summary: Geração de posições por parceiro enviado por meio de um webhook
      description: |
        Realiza a busca assincrona de um objeto JSON que contém uma URL para download do arquivo no formato zip.  

        A busca será disponibilizada em cache por trinta minutos (30 minutos).

        Pelo fato da chamada ser assíncrona, o retorno se dará via **Webhook**, que pode ser cadastrado pelo próprio portal do desenvolvedor em **Webhooks > Manutenção > Botão Cadastrar Webhook**, com nome de **Posições por Parceiro (positions-by-partner)**. 

        Sua documentação pode ser encontrada na página de Webhook. 

        Caso o webhook não esteja cadastrado, será emitido um erro de forma síncrona com a seguinte mensagem:

        `Webhook not registered for partner cnpj [{CNPJ}], cge [{CGE}].`

        **Obs: Está rota também atualizara as posições contidas no arquivo enviado na rota get-partner-position que deve ser utilizada caso queira o link do arquivo de forma síncrona.**

        ---
        **Características:**

        Tipo de chamada: Asíncrona

        Limite de requisições: 60 por minuto

        Frequência de atualização: A cada 30 minutos

        Janela de dados: N/A *(Não se Aplica)*

      operationId: getWebhookPositionByPartner
      parameters:
        - name: x-id-partner-request
          description: |
            UUID gerado randômicamente, usado para identificador cada request efetuado. 
            Sempre utilizar um diferente para cada requisição, mesmo que sejam os mesmos parâmetros.

            *Exemplo:* `5607cd68-3231-4eb7-a1f9-ed3ff854b1af`
          schema:
            type: string
          in: header
          required: true
        - name: access_token
          description: |
            Token de acesso para a API, esse deve ser gerado usando OAuth2 e Grant Type do tipo Client Credentials.
            As credenciais podem ser obtidas pelo portal do desenvolvedor.

            *Exemplo:* `eyJ0eXAiOMNSBHDBDxhUnman9u.eyJ0abdhb2F1jkGfrnmkmGFj.eyJ0sadsadsadas`
          schema:
            type: string
          in: header
          required: true
      responses:
        "202":
          description: Requisição recebida com sucesso.
        "400":
          description: Header ou Body incorretos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "401":
          description: Requisição não autorizado
          content:
            application/json:
