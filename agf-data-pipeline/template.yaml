AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: AGFI Data Pipeline — Lambda stack

Globals:
  Function:
    Runtime: python3.11
    Timeout: 300
    Architectures:
      - x86_64

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  SyncQueueArn:
    Type: String
    Description: ARN da fila SQS (OBRIGATÓRIO)

  SyncQueueDLQArn:
    Type: String
    Description: ARN da DLQ (OBRIGATÓRIO)

  SyncQueueName:
    Type: String
    Default: agfi-sync-queue-dev

  DataLakeBucketName:
    Type: String
    Default: agfi-data-lake-dev

  SyncStateTableName:
    Type: String
    Default: agfi-sync-state-dev

Resources:

# ==========================================
# SNS
# ==========================================
  NotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'agfi-notifications-${Environment}'

# ==========================================
# LAMBDA FUNCTIONS
# ==========================================

  BTGWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'agfi-btg-webhook-${Environment}'
      CodeUri: handlers/
      Handler: webhook_receiver.lambda_handler
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !Ref SyncQueueName

  BTGRequestReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'agfi-btg-request-report-${Environment}'
      CodeUri: handlers/
      Handler: btg_requests.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncStateTableName

  SQSProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'agfi-sqs-processor-${Environment}'
      CodeUri: handlers/
      Handler: data_processor.lambda_handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataLakeBucketName
        - SQSPollerPolicy:
            QueueName: !Ref SyncQueueName

      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !Ref SyncQueueArn   # ✅ CORRIGIDO
            BatchSize: 1

  BTGDLQReconcileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'agfi-btg-dlq-reconcile-${Environment}'
      CodeUri: handlers/
      Handler: btg_dlq_reconcile.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncStateTableName

      Events:
        DLQEvent:
          Type: SQS
          Properties:
            Queue: !Ref SyncQueueDLQArn   # ✅ CORRIGIDO
            BatchSize: 1

# ==========================================
# API GATEWAY
# ==========================================

  WebhookApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'agfi-webhook-api-${Environment}'
      ProtocolType: HTTP

  WebhookIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebhookApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BTGWebhookFunction.Arn
      PayloadFormatVersion: '2.0'

  WebhookRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebhookApi
      RouteKey: 'POST /webhook'
      Target: !Join ['/', ['integrations', !Ref WebhookIntegration]]

  WebhookStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebhookApi
      StageName: '$default'
      AutoDeploy: true

  WebhookPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt BTGWebhookFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

# ==========================================
# LOGS
# ==========================================

  WebhookLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/agfi-btg-webhook-${Environment}'
      RetentionInDays: 7

# ==========================================
# OUTPUTS
# ==========================================

Outputs:
  ApiUrl:
    Value: !Sub 'https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com'