AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AGFI Infrastructure — Recursos persistentes (S3, SQS, DynamoDB).
  Stack: agfi-infra-{Environment}

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:

  DataLakeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub 'agfi-data-lake-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SyncQueueDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub 'agfi-sync-queue-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  SyncQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub 'agfi-sync-queue-${Environment}'
      VisibilityTimeout: 360
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SyncQueueDLQ.Arn
        maxReceiveCount: 3

  SyncStateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub 'agfi-sync-state-${Environment}'
      AttributeDefinitions:
        - AttributeName: sync_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: sync_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

Outputs:

  DataLakeBucketName:
    Value: !Ref DataLakeBucket
    Export:
      Name: !Sub agfi-infra-${Environment}-DataLakeBucketName

  SyncQueueUrl:
    Value: !Ref SyncQueue
    Export:
      Name: !Sub agfi-infra-${Environment}-SyncQueueUrl

  SyncQueueArn:
    Value: !GetAtt SyncQueue.Arn
    Export:
      Name: !Sub agfi-infra-${Environment}-SyncQueueArn

  SyncQueueDLQArn:
    Value: !GetAtt SyncQueueDLQ.Arn
    Export:
      Name: !Sub agfi-infra-${Environment}-SyncQueueDLQArn

  SyncStateTableName:
    Value: !Ref SyncStateTable
    Export:
      Name: !Sub agfi-infra-${Environment}-SyncStateTableName

  SyncQueueName:
    Value: !GetAtt SyncQueue.QueueName
    Export:
      Name: !Sub agfi-infra-${Environment}-SyncQueueName