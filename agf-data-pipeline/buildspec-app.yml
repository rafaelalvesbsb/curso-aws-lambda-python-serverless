version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install aws-sam-cli

  build:
    commands:
      - sam build --template-file agf-data-pipeline/template.yaml

  post_build:
    commands:
      - sam deploy --template-file agf-data-pipeline/template.yaml --stack-name agfi-lambda-dev --no-confirm-changeset --no-fail-on-empty-changeset --capabilities CAPABILITY_NAMED_IAM